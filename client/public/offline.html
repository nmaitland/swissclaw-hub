<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff4500" />
    <title>Swissclaw Hub Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(255, 69, 0, 0.22), transparent 35%),
          linear-gradient(145deg, #090b14, #141a29 60%, #0a0c14);
        color: #e5e7eb;
      }

      .card {
        width: min(440px, 100%);
        border: 1px solid rgba(255, 69, 0, 0.24);
        border-radius: 20px;
        padding: 28px;
        background: rgba(8, 11, 22, 0.9);
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.32);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.4rem;
        color: #ff8354;
      }

      p {
        margin: 0 0 12px;
        line-height: 1.5;
        color: #c7d0e0;
      }

      .hint {
        color: #94a3b8;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Swissclaw Hub is offline</h1>
      <p>The app shell is available, but the live dashboard needs a network connection to load status, chat, and kanban data.</p>
      <p class="hint">Reconnect and reload to continue.</p>
    </main>
  </body>
</html>
